<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adoption-A | Global Blockchain Adaptability Index</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Source+Serif+4:opsz,wght@8..60,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --chassis-main: #B5B39A;
            --chassis-light: #CAC8B0;
            --chassis-dark: #908E78;
            --chassis-deep: #6B6954;

            --screen-bg: #060F28;
            --text-primary: #E0E0E0;
            --text-dim: #8899A6;
            --accent-led: #FF3333;

            --key-face: #ABA992;
            --key-side: #7A7862;
            --key-text: #1a1a15;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'VT323', monospace;
            background: #fafaf7;
        }

        /* Page wrapper — centers the device */
        .page-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #fafaf7 0%, #e8e4da 70%, #d5d0c3 100%);
            position: relative;
        }

        /* Title above device */
        .page-title {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a2a3a;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
            text-align: center;
        }
        .page-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 300;
            color: #7a8a9a;
            margin-bottom: 24px;
            text-align: center;
        }

        /* The device itself — fixed size like a remote */
        .device-casing {
            width: 340px;
            height: 580px;
            background-color: var(--chassis-main);
            display: flex;
            flex-direction: column;
            padding: 16px;
            border-radius: 18px;
            position: relative;
            box-shadow:
                0 2px 0 var(--chassis-light),
                0 -2px 0 var(--chassis-dark),
                0 20px 60px rgba(0,0,0,0.25),
                0 8px 20px rgba(0,0,0,0.15);
        }

        /* Texture overlay on device */
        .device-casing::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 18px;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
            pointer-events: none;
            opacity: 0.4;
            mix-blend-mode: multiply;
        }

        .bezel-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--chassis-dark);
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
        }

        .brand-badge {
            font-size: 1.1rem;
            color: var(--chassis-deep);
            font-weight: bold;
            text-shadow: 0 1px 0 rgba(255,255,255,0.3);
            border: 2px solid var(--chassis-deep);
            padding: 1px 7px;
            background: rgba(0,0,0,0.05);
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.15);
        }

        .power-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--chassis-deep);
            font-weight: bold;
        }

        .led {
            width: 10px;
            height: 10px;
            background-color: #330000;
            border-radius: 2px;
            border: 1px solid rgba(0,0,0,0.5);
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.8);
            transition: background-color 0.2s;
        }

        .led.active {
            background-color: #ff2222;
            box-shadow: 0 0 5px #ff4444, inset 1px 1px 1px rgba(255,255,255,0.5);
        }

        /* CRT Screen */
        .crt-container {
            flex: 1;
            background-color: var(--screen-bg);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            border: 5px solid;
            border-color: var(--chassis-dark) var(--chassis-light) var(--chassis-light) var(--chassis-dark);
            box-shadow: inset 0 0 20px #000;
            padding: 14px;
            display: flex;
            flex-direction: column;
            z-index: 2;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
            opacity: 0.5;
        }

        .crt-glow {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(100,200,255,0.02) 0%, rgba(0,0,0,0.4) 90%);
            pointer-events: none;
            z-index: 11;
        }

        .terminal-content {
            font-size: 1.1rem;
            line-height: 1.2;
            color: var(--text-primary);
            text-shadow: 0 0 4px rgba(200,200,255,0.3);
            overflow-y: auto;
            height: 100%;
            scrollbar-width: none;
        }

        .terminal-content::-webkit-scrollbar { display: none; }

        .line { margin-bottom: 6px; display: flex; flex-wrap: wrap; }
        .prompt { color: #4488ff; margin-right: 6px; white-space: nowrap; }
        .cursor {
            display: inline-block;
            width: 9px;
            height: 1.1em;
            background-color: var(--text-primary);
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed var(--text-dim);
            padding-bottom: 4px;
            margin-bottom: 10px;
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .file-item {
            cursor: pointer;
            padding: 2px 4px;
            display: flex;
            justify-content: space-between;
        }

        .file-item:hover, .file-item.active {
            background-color: var(--text-primary);
            color: var(--screen-bg);
            text-shadow: none;
        }

        /* Keypad */
        .control-deck {
            margin-top: 12px;
            background-color: rgba(0,0,0,0.08);
            border-radius: 8px;
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.1);
            border-bottom-color: rgba(0,0,0,0.15);
            border-right-color: rgba(0,0,0,0.15);
            position: relative;
            z-index: 2;
        }

        .key-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .key {
            position: relative;
            background-color: var(--key-face);
            height: 44px;
            border-radius: 5px;
            border-top: 2px solid rgba(255,255,255,0.4);
            border-left: 2px solid rgba(255,255,255,0.2);
            border-right: 3px solid rgba(0,0,0,0.25);
            border-bottom: 5px solid rgba(0,0,0,0.35);
            color: var(--key-text);
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.05s ease-out;
            box-shadow: 0 3px 5px rgba(0,0,0,0.2);
            font-family: 'VT323', monospace;
        }

        .key::after {
            content: '';
            position: absolute;
            top: 3px; left: 3px; right: 3px; bottom: 3px;
            background: linear-gradient(135deg, rgba(0,0,0,0.05), rgba(255,255,255,0.1));
            border-radius: 3px;
            pointer-events: none;
        }

        .key:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            background-color: #9A9882;
        }

        .key.action {
            background-color: #B8B6A0;
            font-size: 0.85rem;
        }

        .key.enter {
            grid-column: span 2;
            background-color: #8A8872;
            color: #E0E0C0;
            border-bottom-color: rgba(0,0,0,0.5);
        }

        .key.nav {
            background-color: #333333;
            color: #ccc;
            border-top-color: #555;
            border-left-color: #444;
            border-right-color: #111;
            border-bottom-color: #000;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Highlight colors for file categories */
        .highlight-map { color: #5ce65c; }
        .highlight-econ { color: #C5A55A; }
        .highlight-reg { color: #ffcc44; }
        .highlight-infra { color: #44bbff; }
        .file-item.active .highlight-map,
        .file-item.active .highlight-econ,
        .file-item.active .highlight-reg,
        .file-item.active .highlight-infra,
        .file-item:hover .highlight-map,
        .file-item:hover .highlight-econ,
        .file-item:hover .highlight-reg,
        .file-item:hover .highlight-infra {
            color: var(--screen-bg);
        }

        /* Boot animation */
        .boot-line {
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Transition overlay */
        .transition-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #fafaf7;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.6s ease-in;
        }
        .transition-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Responsive — shrink on very small screens */
        @media (max-height: 700px) {
            .device-casing { height: 520px; width: 310px; }
            .key { height: 38px; font-size: 0.9rem; }
            .page-title { font-size: 1.3rem; }
            .page-subtitle { margin-bottom: 16px; }
        }
        @media (max-height: 600px) {
            .page-title, .page-subtitle { display: none; }
            .device-casing { height: 95vh; }
        }
    </style>
</head>
<body>

<div class="transition-overlay" id="transitionOverlay"></div>

<div class="page-wrapper">
    <div class="page-title">Global Blockchain Adaptability Index</div>
    <div class="page-subtitle">20 Countries &middot; 3 Dimensions &middot; Interactive Analysis</div>

    <div class="device-casing">

        <div class="bezel-top">
            <div class="brand-badge">ADOPT-A</div>
            <div class="power-indicator">
                <span>ONLINE</span>
                <div class="led active"></div>
            </div>
        </div>

        <div class="crt-container">
            <div class="scanlines"></div>
            <div class="crt-glow"></div>
            <div class="terminal-content" id="terminal"></div>
        </div>

        <div class="control-deck">
            <div class="key-grid">
                <button class="key action" onclick="typeCommand('MAP')">MAP</button>
                <button class="key action" onclick="typeCommand('DATA')">DATA</button>
                <button class="key action" onclick="typeCommand('CLS')">CLS</button>
                <button class="key action" style="color:#d44" onclick="systemReset()">RST</button>

                <button class="key" onclick="typeChar('A')">A</button>
                <button class="key" onclick="typeChar('B')">B</button>
                <button class="key nav" onclick="navigate('UP')">&#9650;</button>
                <button class="key" onclick="typeChar('C')">C</button>

                <button class="key" onclick="typeChar('1')">1</button>
                <button class="key" onclick="typeChar('2')">2</button>
                <button class="key nav" onclick="navigate('DOWN')">&#9660;</button>
                <button class="key" onclick="typeChar('3')">3</button>

                <button class="key" onclick="typeChar('.')">.</button>
                <button class="key" onclick="backspace()">DEL</button>
                <button class="key enter" onclick="executeCommand()">ENTER &#8629;</button>
            </div>
        </div>
    </div>
</div>

<script>
    const terminalElement = document.getElementById('terminal');
    let currentInput = "";
    let selectedIndex = 0;
    let fileListItems = [];
    let bootComplete = false;

    const bootLines = [
        { text: 'ADOPT-A TERMINAL v2.6 (C) 2026', delay: 0, type: 'header' },
        { text: '________________________________', delay: 150, type: 'divider' },
        { text: '', delay: 300, type: 'blank' },
        { text: 'LOADING BLOCKCHAIN INDEX... OK', delay: 400, type: 'boot' },
        { text: 'SCANNING 20 NATIONS....... OK', delay: 700, type: 'boot' },
        { text: 'PARSING ECONOMIC DATA..... OK', delay: 1000, type: 'boot' },
        { text: 'MAPPING REGULATIONS....... OK', delay: 1300, type: 'boot' },
        { text: 'INDEXING INFRASTRUCTURE... OK', delay: 1600, type: 'boot' },
        { text: '', delay: 1800, type: 'blank' },
        { text: 'STATUS_BAR', delay: 1900, type: 'status' },
        { text: '', delay: 2000, type: 'blank' },
        { text: 'FILE_LIST', delay: 2100, type: 'files' },
        { text: '', delay: 2400, type: 'blank' },
        { text: 'PROMPT', delay: 2500, type: 'prompt' },
    ];

    function runBootSequence() {
        bootLines.forEach((line) => {
            setTimeout(() => {
                if (line.type === 'header') {
                    const el = document.createElement('div');
                    el.className = 'line boot-line';
                    el.style.color = '#5ce65c';
                    el.style.fontSize = '1.15rem';
                    el.textContent = line.text;
                    terminalElement.appendChild(el);
                } else if (line.type === 'divider') {
                    const el = document.createElement('div');
                    el.className = 'line boot-line';
                    el.style.color = '#5ce65c';
                    el.textContent = line.text;
                    terminalElement.appendChild(el);
                } else if (line.type === 'boot') {
                    const el = document.createElement('div');
                    el.className = 'line boot-line';
                    el.textContent = line.text;
                    terminalElement.appendChild(el);
                } else if (line.type === 'blank') {
                    terminalElement.appendChild(document.createElement('br'));
                } else if (line.type === 'status') {
                    const el = document.createElement('div');
                    el.className = 'status-row boot-line';
                    el.innerHTML = '<span>20 COUNTRIES</span><span>CHAIN://</span>';
                    terminalElement.appendChild(el);
                } else if (line.type === 'files') {
                    const fileList = document.createElement('div');
                    fileList.className = 'file-list boot-line';
                    fileList.id = 'fileList';

                    const files = [
                        { label: '[MAP]  EXPLORE_GLOBE', cls: 'highlight-map', name: 'EXPLORE_GLOBE' },
                        { label: '[IDX]  ECONOMIC_ADOPTION', cls: 'highlight-econ', name: 'ECONOMIC_ADOPTION' },
                        { label: '[IDX]  REGULATORY_CLARITY', cls: 'highlight-reg', name: 'REGULATORY_CLARITY' },
                        { label: '[IDX]  TECH_INFRASTRUCTURE', cls: 'highlight-infra', name: 'TECH_INFRASTRUCTURE' },
                    ];

                    files.forEach((f, idx) => {
                        const item = document.createElement('div');
                        item.className = 'file-item' + (idx === 0 ? ' active' : '');
                        item.onclick = function() { selectFile(this); };

                        const tag = f.label.match(/\[.*?\]/)[0];
                        const name = f.label.replace(tag + '  ', '');
                        item.innerHTML = tag + '  <span class="' + f.cls + '">' + name + '</span>';
                        item.dataset.name = f.name;
                        fileList.appendChild(item);
                    });

                    terminalElement.appendChild(fileList);
                    fileListItems = document.querySelectorAll('.file-item');
                } else if (line.type === 'prompt') {
                    const promptLine = document.createElement('div');
                    promptLine.className = 'line boot-line';
                    promptLine.id = 'inputLine';
                    promptLine.innerHTML = '<span class="prompt">CHAIN@ADOPT-A:~$</span> <span id="typewriter"></span><span class="cursor"></span>';
                    terminalElement.appendChild(promptLine);
                    bootComplete = true;
                }

                terminalElement.scrollTop = terminalElement.scrollHeight;
            }, line.delay);
        });
    }

    function typeChar(char) {
        if (!bootComplete) return;
        if (currentInput.length < 20) {
            currentInput += char;
            updateDisplay();
        }
    }

    function typeCommand(cmd) {
        if (!bootComplete) return;
        currentInput = cmd;
        updateDisplay();
    }

    function backspace() {
        if (!bootComplete) return;
        currentInput = currentInput.slice(0, -1);
        updateDisplay();
    }

    function updateDisplay() {
        const el = document.getElementById('typewriter');
        if (el) el.textContent = currentInput;
    }

    function navigate(direction) {
        if (!bootComplete || fileListItems.length === 0) return;
        fileListItems[selectedIndex].classList.remove('active');
        if (direction === 'UP') {
            selectedIndex = selectedIndex > 0 ? selectedIndex - 1 : fileListItems.length - 1;
        } else {
            selectedIndex = selectedIndex < fileListItems.length - 1 ? selectedIndex + 1 : 0;
        }
        fileListItems[selectedIndex].classList.add('active');
        const name = fileListItems[selectedIndex].dataset.name;
        if (name) currentInput = "OPEN " + name;
        updateDisplay();
    }

    function navigateTo(url) {
        const overlay = document.getElementById('transitionOverlay');
        overlay.classList.add('active');
        setTimeout(() => { window.location.href = url; }, 600);
    }

    function executeCommand() {
        if (!bootComplete) return;
        if (!currentInput) {
            navigateTo('map.html');
            return;
        }

        const inputLine = document.getElementById('inputLine');

        const newLine = document.createElement('div');
        newLine.className = 'line';
        newLine.innerHTML = '<span class="prompt">CHAIN@ADOPT-A:~$</span> ' + currentInput;
        terminalElement.insertBefore(newLine, inputLine);

        const responseLine = document.createElement('div');
        responseLine.className = 'line';
        responseLine.style.color = '#8899A6';

        const cmd = currentInput.toUpperCase().trim();

        if (cmd === 'CLS') {
            while (terminalElement.firstChild && terminalElement.firstChild !== inputLine) {
                terminalElement.removeChild(terminalElement.firstChild);
            }
            const status = document.createElement('div');
            status.className = 'status-row';
            status.innerHTML = '<span>20 COUNTRIES</span><span>CHAIN://</span>';
            terminalElement.insertBefore(status, inputLine);
        } else if (cmd === 'RST') {
            location.reload();
        } else if (cmd === 'MAP' || cmd === 'OPEN EXPLORE_GLOBE') {
            responseLine.textContent = '> LAUNCHING GLOBAL MAP...';
            responseLine.style.color = '#5ce65c';
            terminalElement.insertBefore(responseLine, inputLine);
            setTimeout(() => navigateTo('map.html'), 800);
        } else if (cmd === 'OPEN ECONOMIC_ADOPTION') {
            responseLine.textContent = '> LOADING ECONOMIC DATA...';
            responseLine.style.color = '#C5A55A';
            terminalElement.insertBefore(responseLine, inputLine);
            setTimeout(() => navigateTo('map.html#economic'), 800);
        } else if (cmd === 'OPEN REGULATORY_CLARITY') {
            responseLine.textContent = '> LOADING REGULATORY DATA...';
            responseLine.style.color = '#ffcc44';
            terminalElement.insertBefore(responseLine, inputLine);
            setTimeout(() => navigateTo('map.html#regulatory'), 800);
        } else if (cmd === 'DATA' || cmd === 'OPEN TECH_INFRASTRUCTURE') {
            responseLine.textContent = '> LOADING INFRASTRUCTURE DATA...';
            responseLine.style.color = '#44bbff';
            terminalElement.insertBefore(responseLine, inputLine);
            setTimeout(() => navigateTo('data.html'), 800);
        } else if (cmd === 'HELP') {
            responseLine.innerHTML =
                '> COMMANDS:<br>' +
                '  MAP  - Interactive globe<br>' +
                '  DATA - Country rankings<br>' +
                '  CLS  - Clear screen<br>' +
                '  RST  - Reboot terminal';
            responseLine.style.color = '#ffcc44';
            terminalElement.insertBefore(responseLine, inputLine);
        } else {
            responseLine.textContent = '> UNKNOWN: ' + currentInput + ' (HELP)';
            responseLine.style.color = '#ff6666';
            terminalElement.insertBefore(responseLine, inputLine);
        }

        currentInput = "";
        updateDisplay();
        terminalElement.scrollTop = terminalElement.scrollHeight;
    }

    function selectFile(el) {
        if (!bootComplete) return;
        fileListItems.forEach(item => item.classList.remove('active'));
        el.classList.add('active');
        selectedIndex = Array.from(fileListItems).indexOf(el);
        const name = el.dataset.name;
        currentInput = "OPEN " + name;
        updateDisplay();
    }

    function systemReset() {
        const lines = document.querySelectorAll('.line, .file-list, .status-row, br');
        lines.forEach(l => l.style.display = 'none');
        setTimeout(() => { location.reload(); }, 500);
    }

    runBootSequence();
</script>

</body>
</html>
