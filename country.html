            letter-spacing: 0.5px;
            color: #9aa5b0;
            margin-bottom: 4px;

        .stat-item-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a2a3a;

        @media (max-width: 768px) {

            .bar-label { width: 110px; font-size: 0.76rem; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }

            : c.technical.label === 'Developing' ? 'tier-developing-tech'
            : c.technical.label === 'Emerging' ? 'tier-emerging' : 'tier-nascent';

        const iso2 = isoMap[c.id] || '';
        const flagUrl = iso2 ? `https://flagcdn.com/w1280/${iso2}.png` : '';
        const heroStyle = flagUrl ? `style="background-image:url('${flagUrl}');"` : '';

        const m = meanings[c.country] || { headline: '', takeaway: '' };
        const { strong, weak } = dimRanks(c);
        const band = rankBand(c.overallRank);
        const overallBandLabel = scoreBand(c.overall, 'overall');
        const strongBandLabel = scoreBand(strong.score, strong.key);
        const weakBandLabel = scoreBand(weak.score, weak.key);
        const contextLine = `An overall score of <strong>${c.overall.toFixed(3)}</strong> places ${c.country} at <strong>#${c.overallRank} of 20</strong> (${overallBandLabel}), in the ${band}, meaning ${rankBandMeaning(c.overallRank)}. Its strongest dimension is <strong>${strong.label}</strong> (#${strong.rank}, score ${strong.score.toFixed(3)}, ${strongBandLabel}); its weakest is <strong>${weak.label}</strong> (#${weak.rank}, score ${weak.score.toFixed(3)}, ${weakBandLabel}).`;

        let html = `
        <!-- HERO -->
        <section class="hero">
            <div class="hero-card" ${heroStyle}>
                <div class="hero-top">
                    <div class="hero-left">
                        <h1>${c.country}</h1>
                        <span class="hero-rank">#${c.overallRank} Overall</span>
                        <div class="hero-region">${c.region}</div>
                        <button class="share-btn" onclick="shareCountry()">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                            Share Profile
                            <span class="share-toast" id="shareToast">Link copied!</span>
                        </button>
                    </div>
                    <div class="hero-right">
                        <div class="hero-score-label">Overall Score</div>
                        <div class="hero-score">${c.overall.toFixed(3)}</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- WHAT THIS SCORE MEANS -->
        <section class="meaning-section">
            <div class="meaning-card">
                <div class="meaning-eyebrow">What this score means</div>
                <div class="meaning-headline">${m.headline}</div>
                <p class="meaning-context">${contextLine}</p>
                <div class="meaning-takeaway"><strong>The bigger picture</strong>${m.takeaway}</div>
            </div>
        </section>

        <!-- RADAR + DIMENSIONS -->
        <section class="radar-section">
            <div class="radar-card">
                <div class="radar-chart-container" id="radarChart"></div>
                <div class="dimension-cards">
                    <div class="dim-card">
                        <div class="dim-card-label">Economic</div>
                        <div class="dim-card-score">${c.economic.score.toFixed(3)}</div>
                        <div class="dim-card-rank">#${c.economic.rank} of 20</div>
                    </div>
                    <div class="dim-card">
                        <div class="dim-card-label">Regulatory</div>
                        <div class="dim-card-score">${c.regulatory.score.toFixed(3)}</div>
                        <div class="dim-card-tier ${regTierClass}">${c.regulatory.label}</div>
                    </div>
                    <div class="dim-card">
                        <div class="dim-card-label">Technical</div>
                        <div class="dim-card-score">${c.technical.score.toFixed(3)}</div>
                        <div class="dim-card-tier ${techTierClass}">${c.technical.label}</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- NARRATIVE -->
        <section class="narrative-section">
            <div class="narrative-card">
                <h3>Country Profile</h3>
                <p>${c.narrative}</p>
            </div>
        </section>

        <!-- ECONOMIC BREAKDOWN -->
        <section class="breakdown-section">
            <div class="breakdown-card">
                <h3>Economic Adoption <span class="dim-badge badge-econ">Score: ${c.economic.score.toFixed(3)}</span></h3>
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-item-label">Ownership</div>
                        <div class="stat-item-value">${c.economic.ownership}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-item-label">24h Volume</div>
                        <div class="stat-item-value">${c.economic.volume}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-item-label">Remit / Capita</div>
                        <div class="stat-item-value">${c.economic.remitCapita}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-item-label">Chainalysis Rank</div>
                        <div class="stat-item-value">#${c.economic.chainalysisRank}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-item-label">Confidence</div>
                        <div class="stat-item-value">${c.economic.confidence}</div>
                    </div>
                </div>
                <p style="font-size:0.82rem; color:#7a8a9a; font-style:italic;">&ldquo;${c.economic.keyDriver}&rdquo;</p>
                <p style="font-size:0.8rem; color:#aab5c0; margin-top:8px;"><a href="econ-methodology.html" style="color:#0a4c6a;">View full economic methodology &rarr;</a></p>
            </div>
        </section>

        <!-- REGULATORY BREAKDOWN -->
        <section class="breakdown-section">
            <div class="breakdown-card">
                <h3>Regulatory Clarity <span class="dim-badge badge-reg">${c.regulatory.label}</span></h3>
                <div class="reg-grid">
                    ${renderRegItem('Stablecoin Law', c.regulatory.stablecoin, 'Legislation governing stablecoin issuance and reserves')}
                    ${renderRegItem('Licensing', c.regulatory.licensing, 'Exchange and service provider licensing requirements')}
                    ${renderRegItem('Tax Clarity', c.regulatory.tax, 'Defined tax treatment for crypto transactions')}
                    ${renderRegItem('Banking Access', c.regulatory.banking, 'Whether crypto businesses can access traditional banking')}
                    ${renderRegItem('Enforcement', c.regulatory.enforcement, 'Active enforcement of crypto regulations')}
                    ${renderRegItem('DeFi Recognition', c.regulatory.defi, 'Whether DeFi is acknowledged in the legal framework')}
                </div>
                <p style="font-size:0.78rem; color:#9aa5b0; margin-top:12px;">Rating scale: 3 = clear, codified rules &middot; 2 = partial or in-progress &middot; 1 = absent, banned, or no guidance</p>
                <p style="font-size:0.8rem; color:#aab5c0; margin-top:8px;"><a href="regulatory-methodology.html" style="color:#9b5a30;">View full regulatory methodology &rarr;</a></p>
            </div>
        </section>

        <!-- TECHNICAL BREAKDOWN -->
        <section class="breakdown-section">
            <div class="breakdown-card">
                <h3>Technical Infrastructure <span class="dim-badge badge-tech">${c.technical.label}</span></h3>
                ${renderBar('BTC Nodes', c.technical.btcScore, '#2e5fa1')}
                ${renderBar('ETH Nodes', c.technical.ethScore, '#2e5fa1')}
                ${renderBar('Mining Hashrate', c.technical.miningScore, '#2e5fa1')}
                ${renderBar('Lightning Network', c.technical.lnScore, '#2e5fa1')}
                ${renderBar('Enabling Env.', c.technical.enablingScore, '#2e5fa1')}
                <p style="font-size:0.8rem; color:#aab5c0; margin-top:16px;"><a href="tech-methodology.html" style="color:#2e5fa1;">View full technical methodology &rarr;</a></p>
            </div>
        </section>`;

        document.getElementById('page-content').innerHTML = html;
        drawRadar(c);
    }

    function renderRegItem(label, rating, desc) {
        return `<div class="reg-item">
            <div class="reg-item-label">${label}</div>
            <div class="reg-item-rating rating-${rating}">${rating}</div>
            <div class="reg-item-desc">${desc}</div>
        </div>`;
    }

    function renderBar(label, score, color) {
        const pct = (score * 100).toFixed(1);
        return `<div class="bar-row">
            <div class="bar-label">${label}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${color};"></div></div>
            <div class="bar-value">${score.toFixed(3)}</div>
        </div>`;
    }

    // ========================================
    // RADAR CHART
    // ========================================
    function drawRadar(data) {
        const container = document.getElementById('radarChart');
        if (!container) return;
        // Wider canvas (W>H) so the bottom-left/right labels and their
        // numeric values fit without clipping. Chart itself stays compact.
        const W = 360, H = 300;
        const cx = W / 2, cy = 140, r = 100;
        const dims = [
            { label: 'Economic', value: data.economic.score },
            { label: 'Regulatory', value: data.regulatory.score },
            { label: 'Technical', value: data.technical.score }
        ];
        const n = dims.length;
        const angleSlice = (Math.PI * 2) / n;

        let svgHtml = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

        // Grid rings
        [0.25, 0.5, 0.75, 1.0].forEach(level => {
            const rr = r * level;
            let points = [];
            for (let i = 0; i < n; i++) {
                const angle = angleSlice * i - Math.PI / 2;
                points.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
            }
            svgHtml += `<polygon points="${points.join(' ')}" fill="none" stroke="#e0e0e0" stroke-width="1"/>`;
            // Level label
            if (level < 1.0) {
                const angle = angleSlice * 0 - Math.PI / 2;
                svgHtml += `<text x="${cx + rr * Math.cos(angle) + 4}" y="${cy + rr * Math.sin(angle) - 4}" font-size="9" fill="#ccc" font-family="Inter,sans-serif">${level.toFixed(2)}</text>`;
            }
        });

        // Axis lines
        for (let i = 0; i < n; i++) {
            const angle = angleSlice * i - Math.PI / 2;
            svgHtml += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(angle)}" y2="${cy + r * Math.sin(angle)}" stroke="#ddd" stroke-width="1"/>`;
        }

        // Data polygon
        let dataPoints = [];
        for (let i = 0; i < n; i++) {
            const angle = angleSlice * i - Math.PI / 2;
            const val = dims[i].value;
            dataPoints.push(`${cx + r * val * Math.cos(angle)},${cy + r * val * Math.sin(angle)}`);
        }
        svgHtml += `<polygon points="${dataPoints.join(' ')}" fill="rgba(10,76,106,0.15)" stroke="#0a4c6a" stroke-width="2.5"/>`;

        // Data dots + value labels
        for (let i = 0; i < n; i++) {
            const angle = angleSlice * i - Math.PI / 2;
            const val = dims[i].value;
            const dx = cx + r * val * Math.cos(angle);
            const dy = cy + r * val * Math.sin(angle);
            svgHtml += `<circle cx="${dx}" cy="${dy}" r="5" fill="#0a4c6a" stroke="#fff" stroke-width="2"/>`;
        }

        // Labels
        for (let i = 0; i < n; i++) {
            const angle = angleSlice * i - Math.PI / 2;
            const lx = cx + (r + 30) * Math.cos(angle);
            const ly = cy + (r + 30) * Math.sin(angle);
            const anchor = Math.abs(Math.cos(angle)) < 0.1 ? 'middle' : Math.cos(angle) > 0 ? 'start' : 'end';
            svgHtml += `<text x="${lx}" y="${ly}" text-anchor="${anchor}" dominant-baseline="middle" font-family="Inter,sans-serif" font-size="12" fill="#5a6a7a" font-weight="600">${dims[i].label}</text>`;
            svgHtml += `<text x="${lx}" y="${ly + 15}" text-anchor="${anchor}" dominant-baseline="middle" font-family="Inter,sans-serif" font-size="11" fill="#0a4c6a" font-weight="700">${dims[i].value.toFixed(3)}</text>`;
        }

        svgHtml += '</svg>';
        container.innerHTML = svgHtml;
    }

    // ========================================
    // SHARE
    // ========================================
    function shareCountry() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => {
            const toast = document.getElementById('shareToast');
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 2000);
        }).catch(() => {
            // Fallback
            const input = document.createElement('input');
            input.value = url;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            const toast = document.getElementById('shareToast');
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 2000);
        });
    }
    </script>
</body>
</html>
